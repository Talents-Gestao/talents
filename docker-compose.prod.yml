# Docker Compose para produção (Coolify / servidor).
# Build: docker compose -f docker-compose.prod.yml build
# Coolify: defina o arquivo compose como docker-compose.prod.yml e o diretório base em talents/
#
# Variáveis: use o painel do Coolify ou um .env na raiz do projeto com DB_*, APP_KEY, APP_URL, etc.

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: php
    image: talents-php:prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
    volumes:
      - talents_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "$$s=@fsockopen('127.0.0.1',9000); exit($$s!==false?0:1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: nginx
    restart: unless-stopped
    # Sem "ports:" no host: Coolify/Traefik já usa a :80 e encaminha pelo proxy.
    # Servidor só Docker (sem Coolify): acrescente ports: ["80:80"] ou use override local.
    expose:
      - "80"
    volumes:
      - talents_storage:/var/www/html/storage:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-talents}
      POSTGRES_USER: ${DB_USERNAME:-talents}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - talents_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  queue:
    image: talents-php:prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      CONTAINER_ROLE: queue
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=1", "--timeout=1800", "--memory=512"]
    volumes:
      - talents_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy

volumes:
  talents_pgdata:
  talents_storage:
